name: wics_hackathon_2026
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_core: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - lib/images/boxing.jpg
    - lib/images/gaming.jpg
    - lib/images/gym.jpg
    - lib/images/picketball.jpg
    - lib/images/soccer.jpg
    - lib/images/tennis.png

fonts:
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay-VariableFont_wght.ttf
          weight: 400
        - asset: assets/fonts/PlayfairDisplay-VariableFont_wght.ttf
          weight: 500
        - asset: assets/fonts/PlayfairDisplay-VariableFont_wght.ttf
          weight: 700
        - asset: assets/fonts/PlayfairDisplay-Italic-VariableFont_wght.ttf
          style: italic
        - asset: assets/fonts/PlayfairDisplay-Italic-VariableFont_wght.ttf
          weight: 700
          style: italic
    - family: DM Sans
      fonts:
        - asset: assets/fonts/DMSans-VariableFont_opsz,wght.ttf
          weight: 300
        - asset: assets/fonts/DMSans-VariableFont_opsz,wght.ttf
          weight: 400
        - asset: assets/fonts/DMSans-VariableFont_opsz,wght.ttf
          weight: 500

      assets:
    - assets/fonts/
